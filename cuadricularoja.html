<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minijuego - Linterna Geométrica</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Black+Ops+One&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="style.css">
</head>

<body class="escenario-juego">

    <p id="instruccion-juego">
        ENCUENTRA LOS CUADROS DE COLOR CORRESPONDIENTES AL JUEGO
    </p>

    <div id="selector-constelaciones">

        <a href="index.html" class="back-arrow" title="Volver">&#8592;</a>
        

        <p class="advertencia-sitio">
            Precaución: este sitio cuenta con sonidos y luces que pueden ser fuertes para algunos usuarios.
        </p>

        <h2>Encuentra los cuadros Rojo, Verde, Amarillo y Azul. </h2>
        <h2>Selecciona Cuántas formas quieres encontrar</h2>

        <div class="selector-botones">

            <button class="boton-cantidad-formas" data-total="2">
                2 formas
            </button>

            <button class="boton-cantidad-formas" data-total="3">
                3 formas
            </button>

            <button class="boton-cantidad-formas" data-total="4">
                4 formas
            </button>

        </div>

    </div>

    <div class="linterna-oscuridad" id="capa-negra"></div>

    <div class="cuadricula-oculta" id="tablero-rejilla"></div>

    <div id="contenedor-linea-final"></div>

    <script src="script.js"></script>

</body>
</html>
